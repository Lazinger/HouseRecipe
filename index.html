<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Le Carnet — recettes de cuisine</title>
<meta name="description" content="Un carnet de recettes numérique : entrées, plats et desserts, avec liste de courses et favoris.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== EN-TÊTE ===== -->
<header class="site-header">
  <div class="header-row">
    <div class="header-left">
      <button id="menuToggle" class="menu-toggle" type="button" aria-label="Ouvrir le menu">
        <svg viewBox="0 0 24 24" width="19" height="19"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 14c0-4 3.5-8 12-8s12 4 12 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M6 14h28l-2.5 18a3 3 0 0 1-3 2.6H11.5a3 3 0 0 1-3-2.6L6 14Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M13 14V9M20 14V6M27 14V9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="brand-text">
        <h1>Le Carnet</h1>
        <p>recettes glanées &amp; retenues</p>
      </div>
      </div>
    </div>
    <div class="header-actions">
      <button id="timerBadge" class="timer-badge" type="button" hidden>
        <svg viewBox="0 0 24 24" width="15" height="15"><circle cx="12" cy="13" r="8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 9v4l3 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 2h6M12 2v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span id="timerBadgeValue">00:00</span>
      </button>
      <button id="cartToggle" class="cart-toggle" type="button" aria-label="Panier de courses">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 8h16l-1.5 10.5a2 2 0 0 1-2 1.5H7.5a2 2 0 0 1-2-1.5L4 8Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 8V6a4 4 0 0 1 8 0v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span id="cartBadge" class="cart-badge" hidden>0</span>
      </button>
      <button id="favToggle" class="fav-toggle" type="button" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 20.5s-7.5-4.6-10-9.4C.4 7.6 2 4 5.6 3.4 8 3 10.2 4.2 12 6.6 13.8 4.2 16 3 18.4 3.4 22 4 23.6 7.6 22 11.1c-2.5 4.8-10 9.4-10 9.4Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span>Favoris</span>
      </button>
    </div>
  </div>

  <div class="search-row">
    <label class="search-box" for="searchInput">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.8-4.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="Chercher une recette, un ingrédient…" autocomplete="off">
    </label>
  </div>

  <nav class="chip-row" aria-label="Filtrer par catégorie">
    <button class="chip is-active" data-filter="tout" type="button">Tout</button>
    <button class="chip" data-filter="entrée" type="button">Entrées</button>
    <button class="chip" data-filter="plat" type="button">Plats</button>
    <button class="chip" data-filter="dessert" type="button">Desserts</button>
    <button class="chip chip-fav" data-filter="favoris" type="button">
      <svg viewBox="0 0 24 24" width="13" height="13"><path d="M12 20.5s-7.5-4.6-10-9.4C.4 7.6 2 4 5.6 3.4 8 3 10.2 4.2 12 6.6 13.8 4.2 16 3 18.4 3.4 22 4 23.6 7.6 22 11.1c-2.5 4.8-10 9.4-10 9.4Z" fill="currentColor"/></svg>
      Mes favoris
    </button>
  </nav>
</header>

<!-- ===== CONTENU PRINCIPAL ===== -->
<main id="mainView">
  <section class="hero" id="heroSlot" aria-label="Recette du jour"></section>

  <section class="grid-section">
    <div class="grid-heading">
      <h2 id="resultTitle">Toutes les recettes</h2>
      <span id="resultCount" class="result-count"></span>
    </div>
    <div id="recipeGrid" class="recipe-grid"></div>
    <p id="emptyState" class="empty-state" hidden>
      Rien à se mettre sous la dent. Essayez un autre mot-clé ou une autre catégorie.
    </p>
  </section>
</main>

<!-- ===== VUE DÉTAIL (fiche recette plein écran) ===== -->
<section id="detailView" class="detail-view" aria-hidden="true">
  <div class="detail-scroll" id="detailScroll"></div>
</section>

<!-- ===== VUE AJOUT (formulaire plein écran) ===== -->
<section id="addView" class="detail-view add-view" aria-hidden="true">
  <div class="detail-scroll" id="addScroll"></div>
</section>

<!-- ===== VUE PANIER (liste de courses plein écran) ===== -->
<section id="panierView" class="detail-view add-view" aria-hidden="true">
  <div class="detail-scroll" id="panierScroll"></div>
</section>

<button id="addFab" class="fab" type="button" aria-label="Ajouter une recette">
  <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
</button>

<!-- ===== TIROIR DE NAVIGATION ===== -->
<div id="drawerOverlay" class="drawer-overlay" hidden></div>
<nav id="drawer" class="drawer" aria-hidden="true" aria-label="Navigation principale">
  <div class="drawer-head">
    <span class="drawer-title">Le Carnet</span>
    <button id="drawerCloseBtn" class="drawer-close" type="button" aria-label="Fermer le menu">✕</button>
  </div>
  <div class="drawer-nav">
    <button class="drawer-item" id="navAllBtn" type="button">
      <span class="drawer-item-icon"><svg viewBox="0 0 24 24" width="19" height="19"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/></svg></span>
      Toutes les recettes
    </button>
    <button class="drawer-item" id="navFavBtn" type="button">
      <span class="drawer-item-icon"><svg viewBox="0 0 24 24" width="19" height="19"><path d="M12 20.5s-7.5-4.6-10-9.4C.4 7.6 2 4 5.6 3.4 8 3 10.2 4.2 12 6.6 13.8 4.2 16 3 18.4 3.4 22 4 23.6 7.6 22 11.1c-2.5 4.8-10 9.4-10 9.4Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>
      Favoris
    </button>
    <button class="drawer-item" id="navPanierBtn" type="button">
      <span class="drawer-item-icon"><svg viewBox="0 0 24 24" width="19" height="19"><path d="M4 8h16l-1.5 10.5a2 2 0 0 1-2 1.5H7.5a2 2 0 0 1-2-1.5L4 8Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 8V6a4 4 0 0 1 8 0v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
      Panier de courses
    </button>
    <button class="drawer-item" id="navAddBtn" type="button">
      <span class="drawer-item-icon"><svg viewBox="0 0 24 24" width="19" height="19"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
      Ajouter une recette
    </button>
  </div>
</nav>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
